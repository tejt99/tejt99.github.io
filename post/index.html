<!DOCTYPE html>
<html>
<head>
	<title>post</title>
</head>
<body>
<script type="text/javascript">
let params = new URLSearchParams(document.location.search.substring(1));
let post = params.get("p");

const Http = new XMLHttpRequest();
const url='../posts/'+post+'.json';
console.log(url)
Http.open("GET", url);
Http.send();

Http.onreadystatechange = (e) => {
	var postjson = JSON.parse(Http.responseText);
	console.log(postjson);
	var keys = Object.keys(postjson);
	var i;
	for (i of keys) {
		var ele = document.getElementsByClass(i);
		var x;
		for (x of ele) {
			x.innerHTML = postjson.i;
		}
	}
}
</script>
</body>
</html>
