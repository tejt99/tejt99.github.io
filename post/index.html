<!DOCTYPE html>
<html>
<head>
	<title class="title">post</title>
</head>
<body class="content">
<script type="text/javascript">
let params = new URLSearchParams(document.location.search.substring(1));
let post = params.get("p");

const Http = new XMLHttpRequest();
const url='../posts/'+post+'.json';
console.log(url)
Http.open("GET", url);
Http.send();

Http.onreadystatechange = (e) => {
	console.log(Http.responseText);
	var postjson = JSON.parse(Http.responseText);
	console.log(postjson);

	for (var key in postjson){
		var value = postjson[key];
		console.log(key);
		var ele = document.getElementsByClassName(key);
		for (var i of ele) {
			i.innerHTML = value;
		}
	}
	
}
</script>
</body>
</html>
